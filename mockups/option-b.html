<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>시안 B — 상하 흐름형</title>
    <link rel="stylesheet" href="mockup-base.css" />
    <style>
      .b-banner { min-height: 100px; margin: 0; border: none; }
      .b-tabs { display: flex; flex-wrap: wrap; gap: 0; border-bottom: 2px solid #1a4d2e; padding: 0 16px; background: #fafafa; }
      .b-tabs span { padding: 12px 18px; font-size: 13px; font-weight: 700; border-right: 1px solid #ddd; }
      .b-portfolio { margin: 16px; min-height: 140px; }
      .b-triple { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 0 16px 16px; }
      .b-triple .m-block { min-height: 110px; }
    </style>
  </head>
  <body>
    <div class="mockup-banner">
      시안 B — 상하 흐름형 · <a href="index.html">목록</a> · <a href="../index.html">현재 구현</a>
    </div>
    <div class="mockup-page">
      <div style="padding: 12px 16px 0"><span class="mockup-label">시안 B</span></div>
      <header class="m-header">
        <div class="m-logo">LOGO</div>
        <nav class="m-nav">
          <span>회사소개</span><span>사업부문</span><span>실적현황</span><span>공지사항</span><span>문의하기</span>
        </nav>
      </header>
      <div class="m-block dark b-banner">짧은 상단 배너 — 슬로건 중앙 정렬<br />주식회사 글로벌세아</div>
      <nav class="b-tabs" aria-label="사업부문 바로가기">
        <span>시설관리</span><span>미화관리</span><span>보안·주차</span><span>방역관리</span><span>인재파견</span>
      </nav>
      <div class="m-block green b-portfolio">실적현황 — 가로 전폭 강조 영역 (대표 실적 슬라이드)</div>
      <section class="b-triple">
        <div class="m-block">공지사항<br />최근 글 목록</div>
        <div class="m-block green">사업부문 안내<br />요약 + 링크</div>
        <div class="m-block dark">고객지원센터<br />TEL · 운영시간</div>
      </section>
      <footer class="m-footer">푸터 — 회사정보 · 약관 링크</footer>
    </div>
  </body>
</html>
