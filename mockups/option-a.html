<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>시안 A — 좌우 분할형</title>
    <link rel="stylesheet" href="mockup-base.css" />
    <style>
      .a-hero { display: grid; grid-template-columns: 2fr 3fr; min-height: 200px; }
      .a-services { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 16px; background: #fff; }
      .a-services .m-block { min-height: 72px; }
      .a-main { display: grid; grid-template-columns: 3fr 1fr; gap: 12px; padding: 0 16px 16px; }
      .a-left { display: flex; flex-direction: column; gap: 12px; }
      .a-right { display: flex; flex-direction: column; gap: 12px; }
      .a-hero .m-block { border: none; min-height: 200px; }
    </style>
  </head>
  <body>
    <div class="mockup-banner">
      시안 A — 좌우 분할형 · <a href="index.html">목록</a> · <a href="../index.html">현재 구현</a>
    </div>
    <div class="mockup-page">
      <div style="padding: 12px 16px 0"><span class="mockup-label">시안 A</span></div>
      <header class="m-header">
        <div class="m-logo">LOGO</div>
        <nav class="m-nav">
          <span>회사소개</span><span>사업부문</span><span>실적현황</span><span>공지사항</span><span>문의하기</span>
        </nav>
      </header>
      <section class="a-hero">
        <div class="m-block green">슬로건 · 회사소개<br />품격있는 공간 가치를 만드는 기업<br /><strong>주식회사 글로벌세아</strong></div>
        <div class="m-block photo">건물 · 시설 대표 이미지</div>
      </section>
      <section class="a-services">
        <div class="m-block green">시설관리</div>
        <div class="m-block green">미화관리</div>
        <div class="m-block green">보안·주차</div>
        <div class="m-block green">방역관리</div>
        <div class="m-block green">인재파견</div>
        <div class="m-block" style="opacity:0.35">—</div>
      </section>
      <section class="a-main">
        <div class="a-left">
          <div class="m-block" style="min-height:120px">실적현황 — 대표 프로젝트 이미지 + 캡션</div>
          <div class="m-block" style="min-height:100px">공지사항 목록 (5건)</div>
        </div>
        <div class="a-right">
          <div class="m-block dark" style="min-height:80px">온라인 문의</div>
          <div class="m-block green" style="min-height:140px">고객지원센터<br />TEL. 02-0000-0000</div>
        </div>
      </section>
      <footer class="m-footer">푸터 — 회사정보 · 약관 링크</footer>
    </div>
  </body>
</html>
