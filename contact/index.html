<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="../js/site-config.js"></script>
    <script src="../js/viewport.js"></script>
    <title>견적 및 상담문의 — 글로벌세아종합관리</title>
    <meta name="description" content="글로벌세아종합관리 견적 및 상담문의 — 건물관리 서비스 견적과 상담을 온라인으로 신청하세요." />
    <link rel="canonical" href="https://globalseah.com/contact/index.html" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="글로벌세아종합관리" />
    <meta property="og:title" content="견적 및 상담문의 — 글로벌세아종합관리" />
    <meta property="og:description" content="글로벌세아종합관리 견적 및 상담문의 — 건물관리 서비스 견적·상담 신청." />
    <meta property="og:url" content="https://globalseah.com/contact/index.html" />
    <meta property="og:image" content="https://globalseah.com/assets/images/logo.png" />
    <link rel="icon" href="../assets/images/logo.png" type="image/png" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body data-depth="1">
    <main>
      <section class="page-hero">
        <div class="container">
          <ul class="breadcrumb">
            <li><a href="../index.html">홈</a></li>
            <li>견적 및 상담문의</li>
          </ul>
          <h1>견적 및 상담문의</h1>
        </div>
      </section>
      <section class="page-content">
        <div class="container contact-page">
          <article class="content-card contact-form-card">
            <h2 class="contact-form-title">온라인문의</h2>
            <form id="contact-form" class="contact-form contact-form--rows" novalidate>
              <div class="contact-form-row">
                <label for="subject">제목</label>
                <input
                  type="text"
                  id="subject"
                  name="subject"
                  placeholder="제목을 입력해 주세요"
                  required
                />
              </div>
              <div class="contact-form-row">
                <label for="name">이름 / 회사명</label>
                <input
                  type="text"
                  id="name"
                  name="name"
                  placeholder="이름 또는 회사명을 입력해주세요"
                  required
                />
              </div>
              <div class="contact-form-row">
                <label for="phone">연락처</label>
                <input
                  type="tel"
                  id="phone"
                  name="phone"
                  placeholder="연락처를 입력해 주세요"
                />
              </div>
              <div class="contact-form-row">
                <label for="email">이메일</label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="이메일을 입력해 주세요"
                  required
                />
              </div>
              <div class="contact-form-row contact-form-row--textarea">
                <label for="message">문의사항</label>
                <textarea
                  id="message"
                  name="message"
                  placeholder="문의 내용을 입력해 주세요.&#10;신규 문의이신지, 기존 업체에서 전환을 검토 중이신지 함께 남겨주시면 맞춤 상담을 도와드리겠습니다."
                  required
                ></textarea>
              </div>
              <div class="contact-form-row contact-form-row--file">
                <label for="attachment">첨부파일</label>
                <div class="contact-form-file">
                  <input
                    type="file"
                    id="attachment"
                    name="attachment"
                    class="contact-form-file-input"
                    accept=".pdf,.doc,.docx,.xls,.xlsx,.jpg,.jpeg,.png,.gif,.webp,.zip"
                    hidden
                  />
                  <button type="button" class="contact-form-file-btn" id="attachment-trigger">
                    파일 선택
                  </button>
                  <span class="contact-form-file-name" id="attachment-name">선택된 파일 없음</span>
                </div>
              </div>
              <div class="contact-privacy">
                <div class="contact-privacy-line">
                  <label class="contact-privacy-check">
                    <input type="checkbox" id="privacy-consent" name="privacyConsent" required />
                    <span><em>(필수)</em> 개인정보 수집·이용에 동의합니다.</span>
                  </label>
                  <button
                    type="button"
                    class="contact-privacy-toggle"
                    id="privacy-toggle"
                    aria-expanded="false"
                    aria-controls="privacy-detail"
                  >
                    내용보기
                  </button>
                </div>
                <p id="privacy-error" class="contact-privacy-error" hidden>
                  개인정보 수집·이용에 동의해 주세요.
                </p>
                <div class="contact-privacy-box" id="privacy-detail" hidden>
                  <p><strong>1. 수집 항목</strong></p>
                  <p>이름/회사명, 연락처, 이메일, 문의사항, 첨부파일(선택)</p>
                  <p><strong>2. 수집·이용 목적</strong></p>
                  <p>문의 접수, 견적·상담 안내 및 고객 응대</p>
                  <p><strong>3. 보유·이용 기간</strong></p>
                  <p>문의 처리 완료 후 3년 (관련 법령에 따라 보존이 필요한 경우 해당 기간)</p>
                  <p><strong>4. 동의 거부 권리</strong></p>
                  <p>
                    개인정보 수집·이용에 동의하지 않을 수 있으나, 동의하지 않을 경우 온라인 문의
                    접수가 제한될 수 있습니다.
                  </p>
                </div>
              </div>
              <div class="contact-form-actions">
                <button type="submit" class="btn btn-primary">문의 보내기</button>
                <p id="form-status" class="form-note" hidden></p>
              </div>
            </form>
          </article>
        </div>
      </section>
    </main>
    <script src="../js/layout.js"></script>
    <script src="../js/contact.js"></script>
  </body>
</html>
