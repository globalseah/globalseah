<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="../js/site-config.js"></script>
    <script src="../js/viewport.js"></script>
    <title>견적 및 상담문의 — 글로벌세아</title>
    <link rel="icon" href="../assets/images/logo.png" type="image/png" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body data-depth="1">
    <main>
      <section class="page-hero">
        <div class="container">
          <ul class="breadcrumb">
            <li><a href="../index.html">홈</a></li>
            <li>견적 및 상담문의</li>
          </ul>
          <h1>견적 및 상담문의</h1>
        </div>
      </section>
      <section class="page-content">
        <div class="container contact-page">
          <article class="content-card contact-form-card">
            <h2 class="contact-form-title">온라인문의</h2>
            <form id="contact-form" class="contact-form contact-form--rows" novalidate>
              <div class="contact-form-row">
                <label for="subject">제목</label>
                <input
                  type="text"
                  id="subject"
                  name="subject"
                  placeholder="제목을 입력해 주세요"
                  required
                />
              </div>
              <div class="contact-form-row">
                <label for="name">이름 / 회사명</label>
                <input
                  type="text"
                  id="name"
                  name="name"
                  placeholder="이름 또는 회사명을 입력해주세요"
                  required
                />
              </div>
              <div class="contact-form-row">
                <label for="phone">연락처</label>
                <input
                  type="tel"
                  id="phone"
                  name="phone"
                  placeholder="연락처를 입력해 주세요"
                />
              </div>
              <div class="contact-form-row">
                <label for="email">이메일</label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="이메일을 입력해 주세요"
                  required
                />
              </div>
              <div class="contact-form-row contact-form-row--textarea">
                <label for="message">문의사항</label>
                <textarea
                  id="message"
                  name="message"
                  placeholder="문의 내용을 입력해 주세요.&#10;신규 문의이신지, 기존 업체에서 전환을 검토 중이신지 함께 남겨주시면 맞춤 상담을 도와드리겠습니다."
                  required
                ></textarea>
              </div>
              <div class="contact-form-row contact-form-row--file">
                <label for="attachment">첨부파일</label>
                <div class="contact-form-file">
                  <input
                    type="file"
                    id="attachment"
                    name="attachment"
                    class="contact-form-file-input"
                    accept=".pdf,.doc,.docx,.xls,.xlsx,.jpg,.jpeg,.png,.gif,.webp,.zip"
                    hidden
                  />
                  <button type="button" class="contact-form-file-btn" id="attachment-trigger">
                    파일 선택
                  </button>
                  <span class="contact-form-file-name" id="attachment-name">선택된 파일 없음</span>
                </div>
              </div>
              <div class="contact-form-actions">
                <button type="submit" class="btn btn-primary">문의 보내기</button>
                <p id="form-status" class="form-note" hidden></p>
              </div>
            </form>
          </article>
        </div>
      </section>
    </main>
    <script src="../js/layout.js"></script>
    <script src="../js/contact.js"></script>
  </body>
</html>
