<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="../js/site-config.js"></script>
    <script src="../js/viewport.js"></script>
    <title>견적 및 상담문의 — 글로벌세아</title>
    <link rel="icon" href="../assets/images/logo.png" type="image/png" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body data-depth="1">
    <main>
      <section class="page-hero">
        <div class="container">
          <ul class="breadcrumb">
            <li><a href="../index.html">홈</a></li>
            <li>견적 및 상담문의</li>
          </ul>
          <h1>견적 및 상담문의</h1>
        </div>
      </section>
      <section class="page-content">
        <div class="container contact-page">
          <article class="content-card contact-form-card">
            <h2>온라인 문의</h2>
            <p>아래 양식을 작성해 주시면 담당자 이메일로 전달됩니다.</p>
            <form id="contact-form">
              <div class="form-group">
                <label for="name">이름 / 회사명 *</label>
                <input type="text" id="name" name="name" required />
              </div>
              <div class="form-group">
                <label for="email">이메일 *</label>
                <input type="email" id="email" name="email" required />
              </div>
              <div class="form-group">
                <label for="phone">연락처</label>
                <input type="tel" id="phone" name="phone" />
              </div>
              <div class="form-group">
                <label for="type">문의 유형</label>
                <select id="type" name="type">
                  <option value="시설관리">시설관리</option>
                  <option value="미화관리">미화관리</option>
                  <option value="보안·주차관리">보안·주차관리</option>
                  <option value="방역관리">방역관리</option>
                  <option value="인재파견">인재파견</option>
                </select>
              </div>
              <div class="form-group">
                <label for="subject">제목 *</label>
                <input type="text" id="subject" name="subject" required />
              </div>
              <div class="form-group">
                <label for="message">문의 내용 *</label>
                <textarea id="message" name="message" required></textarea>
              </div>
              <button type="submit" class="btn btn-primary">문의 보내기</button>
              <p id="form-status" class="form-note" hidden></p>
              <p class="form-note">
                운영 단계: Resend·SMTP 등으로 서버 발송 API 연동 예정. 수신 이메일은
                site-config.js에서 설정합니다.
              </p>
            </form>
          </article>
        </div>
      </section>
    </main>
    <script src="../js/layout.js"></script>
    <script src="../js/contact.js"></script>
  </body>
</html>
