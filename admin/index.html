<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1280" />
    <meta name="robots" content="noindex, nofollow" />
    <title>관리자 — 글로벌세아종합관리</title>
    <link rel="icon" href="/assets/images/logo.png" type="image/png" />
    <link rel="stylesheet" href="/admin/admin.css?v=10" />
  </head>
  <body data-admin-page="dashboard">
    <div class="admin-root">
      <div class="admin-frame">
        <aside class="admin-sidebar">
          <div class="admin-brand">
            <strong>글로벌세아 관리자</strong>
          </div>
          <nav class="admin-nav" id="admin-nav" aria-label="관리자 메뉴"></nav>
          <div class="admin-sidebar-foot">
            <a href="/" target="_blank" rel="noopener">공개 사이트 보기</a>
          </div>
        </aside>
        <div class="admin-main">
          <header class="admin-topbar">
            <h1 id="admin-page-title">대시보드</h1>
          </header>
          <main class="admin-content">
            <section class="admin-card admin-stat-panel">
              <div class="admin-stat-panel-head">
                <h2 class="admin-stat-title">방문 통계 요약</h2>
                <a class="admin-btn admin-btn--ghost admin-btn--sm" href="/admin/stats.html"
                  >자세히 보기</a
                >
              </div>
              <div class="admin-date-range admin-date-range--panel">
                <label class="admin-date-range-field">
                  <span class="admin-date-range-label">시작일</span>
                  <input
                    type="date"
                    id="dashboard-stats-start"
                    class="admin-input admin-input--date"
                    aria-label="시작일"
                  />
                </label>
                <span class="admin-date-range-sep" aria-hidden="true">~</span>
                <label class="admin-date-range-field">
                  <span class="admin-date-range-label">종료일</span>
                  <input
                    type="date"
                    id="dashboard-stats-end"
                    class="admin-input admin-input--date"
                    aria-label="종료일"
                  />
                </label>
                <button type="button" class="admin-btn admin-btn--sm" id="dashboard-stats-apply">
                  조회
                </button>
              </div>
              <p class="admin-status" id="dashboard-stats-status">통계를 불러오는 중…</p>
              <div id="dashboard-stats-summary"></div>
              <h3 class="admin-stat-subtitle">유입경로 TOP 5</h3>
              <div id="dashboard-stats-channels"></div>
            </section>

            <section class="admin-grid">
              <article class="admin-tile">
                <h3>공지사항</h3>
                <p class="admin-tile-count" id="dashboard-notice-count">—</p>
              </article>
              <article class="admin-tile">
                <h3>실적현황</h3>
                <p class="admin-tile-count" id="dashboard-portfolio-count">—</p>
              </article>
              <article class="admin-tile">
                <h3>채용현황</h3>
                <p class="admin-tile-count" id="dashboard-recruit-count">—</p>
              </article>
              <article class="admin-tile">
                <h3>방문 통계</h3>
              </article>
            </section>
          </main>
        </div>
      </div>
    </div>
    <script src="/admin/js/admin-shell.js"></script>
    <script src="/admin/js/admin-api.js"></script>
    <script src="/admin/js/analytics-view.js"></script>
    <script src="/admin/js/dashboard.js"></script>
  </body>
</html>
