<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1280" />
    <meta name="robots" content="noindex, nofollow" />
    <title>관리자 — 글로벌세아종합관리</title>
    <link rel="icon" href="/assets/images/logo.png" type="image/png" />
    <link rel="stylesheet" href="/admin/admin.css?v=2" />
  </head>
  <body data-admin-page="dashboard">
    <div class="admin-root">
      <div class="admin-frame">
        <aside class="admin-sidebar">
          <div class="admin-brand">
            <strong>글로벌세아 관리자</strong>
            <span>콘텐츠 · 통계 관리</span>
          </div>
          <nav class="admin-nav" id="admin-nav" aria-label="관리자 메뉴"></nav>
          <div class="admin-sidebar-foot">
            <a href="/" target="_blank" rel="noopener">공개 사이트 보기</a>
          </div>
        </aside>
        <div class="admin-main">
          <header class="admin-topbar">
            <h1 id="admin-page-title">대시보드</h1>
            <p class="admin-topbar-meta">1280px 관리자 화면</p>
          </header>
          <main class="admin-content">
            <section class="admin-card">
              <span class="admin-badge">콘텐츠 관리</span>
              <h2>글로벌세아 관리자</h2>
              <p>
                공지사항·실적현황·채용현황을 등록·수정·삭제할 수 있습니다. 변경 내용은 공개
                사이트에 바로 반영됩니다. 방문 통계는 GA4 연동 후 이용할 수 있습니다.
              </p>
            </section>
            <section class="admin-grid">
              <article class="admin-tile">
                <h3>공지사항</h3>
                <p>텍스트 + 이미지 혼합형 게시판</p>
                <a class="admin-btn admin-btn--ghost" href="/admin/notices.html">바로가기</a>
              </article>
              <article class="admin-tile">
                <h3>실적현황</h3>
                <p>이미지 + 시설·용도·위치·사업내용</p>
                <a class="admin-btn admin-btn--ghost" href="/admin/portfolio.html">바로가기</a>
              </article>
              <article class="admin-tile">
                <h3>채용현황</h3>
                <p>구조화 8항목 채용 공고</p>
                <a class="admin-btn admin-btn--ghost" href="/admin/recruit.html">바로가기</a>
              </article>
              <article class="admin-tile">
                <h3>방문 통계</h3>
                <p>GA4 연동 준비 중</p>
                <a class="admin-btn admin-btn--ghost" href="/admin/stats.html">바로가기</a>
              </article>
            </section>
          </main>
        </div>
      </div>
    </div>
    <script src="/admin/js/admin-shell.js"></script>
  </body>
</html>
