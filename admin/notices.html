<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1280" />
    <meta name="robots" content="noindex, nofollow" />
    <title>공지사항 관리 — 글로벌세아종합관리</title>
    <link rel="icon" href="/assets/images/logo.png" type="image/png" />
    <link rel="stylesheet" href="/admin/admin.css?v=3" />
  </head>
  <body data-admin-page="notices">
    <div class="admin-root">
      <div class="admin-frame">
        <aside class="admin-sidebar">
          <div class="admin-brand">
            <strong>글로벌세아 관리자</strong>
            <span>콘텐츠 · 통계 관리</span>
          </div>
          <nav class="admin-nav" id="admin-nav" aria-label="관리자 메뉴"></nav>
          <div class="admin-sidebar-foot">
            <a href="/" target="_blank" rel="noopener">공개 사이트 보기</a>
          </div>
        </aside>
        <div class="admin-main">
          <header class="admin-topbar">
            <h1 id="admin-page-title">공지사항</h1>
            <p class="admin-topbar-meta" id="notice-list-meta">등록일 최신순</p>
          </header>
          <main class="admin-content">
            <div class="admin-toolbar">
              <p class="admin-status" id="notice-list-status"></p>
              <a class="admin-btn" id="notice-write-btn" href="/admin/notice-edit.html">+ 새 공지</a>
            </div>
            <div class="admin-card admin-card--flush">
              <table class="admin-table">
                <thead>
                  <tr>
                    <th scope="col" class="admin-table-num">번호</th>
                    <th scope="col">제목</th>
                    <th scope="col" class="admin-table-type">형식</th>
                    <th scope="col" class="admin-table-date">등록일</th>
                    <th scope="col" class="admin-table-actions">관리</th>
                  </tr>
                </thead>
                <tbody id="notice-list"></tbody>
              </table>
            </div>
          </main>
        </div>
      </div>
    </div>
    <script src="/admin/js/admin-shell.js"></script>
    <script src="/admin/js/admin-api.js"></script>
    <script src="/admin/js/notices-list.js"></script>
  </body>
</html>
