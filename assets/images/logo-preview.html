<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>로고 미리보기 — (주)글로벌세아</title>
    <style>
      body {
        font-family: "Malgun Gothic", sans-serif;
        padding: 40px;
        background: #f5f5f5;
      }
      .panel {
        background: #fff;
        border: 1px solid #ddd;
        padding: 32px;
        margin-bottom: 24px;
      }
      .panel.dark {
        background: #333;
      }
      h2 {
        font-size: 14px;
        color: #666;
        margin: 0 0 16px;
      }
      img {
        height: 52px;
        width: auto;
      }
    </style>
  </head>
  <body>
    <h1>로고 조합 미리보기</h1>
    <div class="panel">
      <h2>기존 (아이콘만)</h2>
      <img src="logo.png" alt="SA 아이콘" />
    </div>
    <div class="panel">
      <h2>신규 — 아이콘 + (주)글로벌세아 (logo-full.svg)</h2>
      <img src="logo-full.svg" alt="(주)글로벌세아" />
    </div>
    <div class="panel dark">
      <h2 style="color: #aaa">어두운 배경</h2>
      <img src="logo-full.svg" alt="(주)글로벌세아" />
    </div>
    <p style="font-size: 13px; color: #666">
      PNG가 필요하면 이 페이지를 열고 캡처하거나, Figma/Canva에서 SVG를 불러와 PNG로 내보내세요.
    </p>
  </body>
</html>
